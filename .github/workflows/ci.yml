name: CI

on:
  push: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build backend Docker image
        run: docker build -t n8nproject-backend ./backend

      - name: Validate backend Python syntax
        run: python -m py_compile backend/app/main.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend/app
          npm install

      - name: Run frontend lint
        run: |
          cd frontend/app
          npm run lint

      - name: Run frontend build
        run: |
          cd frontend/app
          npm run build

      - name: Build frontend Docker image
        run: docker build -t n8nproject-frontend ./frontend/app
