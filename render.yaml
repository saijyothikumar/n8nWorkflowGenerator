services:
  - type: web
    name: n8nproject-fastapi
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: N8N_BASE_URL
        sync: false
      - key: N8N_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false