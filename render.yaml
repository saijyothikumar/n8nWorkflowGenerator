services:
  - type: web_service
    name: n8nproject-fastapi
    env: python
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: N8N_BASE_URL
        fromSecret: N8N_BASE_URL
      - key: N8N_API_KEY
        fromSecret: N8N_API_KEY
      - key: LLM_API_KEY
        fromSecret: LLM_API_KEY
